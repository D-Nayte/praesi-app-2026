command:
  - npm
  - run
  - start
  - --
  - -H
  - 0.0.0.0
  - -p
  - $DATABRICKS_APP_PORT
env:
  - name: DB_TOKEN
    valueFrom: DB_TOKEN
  - name: DB_HOST_NAME
    valueFrom: DB_HOST_NAME
  - name: DB_HTTP_PATH
    valueFrom: DB_HTTP_PATH
  - name: LB_CONNECT_STRING
    valueFrom: LB_CONNECT_STRING
  - name: LB_USERNAME
    valueFrom: LB_USERNAME
  - name: LB_PASSWORD
    valueFrom: LB_PASSWORD
